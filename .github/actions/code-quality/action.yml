name: 'Salesforce Code Quality Reporter'
description: 'Analyzes existing delta folder and posts results to PR'
inputs:
  github-token:
    description: 'Token for posting comments'
    required: true
  pr-number:
    description: 'The PR number'
    required: true

runs:
  using: "composite"
  steps:
          # Check that every new/modified field has FLS in a permission set
    - name: Check field-level security coverage
      shell: bash
      env:
        CI_COMMIT_REF_NAME: ${{ github.event.pull_request.base.ref }}
      run: |
        CHANGED_FIELDS=$(git diff --name-only origin/$CI_COMMIT_REF_NAME...HEAD -- '*.field-meta.xml')
        if [ -z "$CHANGED_FIELDS" ]; then
          echo "No field-meta.xml files changed, skipping FLS check."
          exit 0
        fi

        MISSING=()
        for field_file in $CHANGED_FIELDS; do
          # Extract object and field name from path
          # Expected: force-app/main/default/objects/<Object>/fields/<Field>.field-meta.xml
          object=$(echo "$field_file" | sed 's|.*/objects/\([^/]*\)/fields/.*|\1|')
          field=$(basename "$field_file" .field-meta.xml)
          reference="${object}.${field}"

          if ! grep -rl "<field>${reference}</field>" force-app/main/default/permissionsets/ > /dev/null 2>&1; then
            MISSING+=("$reference (from $field_file)")
          fi
        done

        if [ ${#MISSING[@]} -gt 0 ]; then
          echo "ERROR: The following fields are not referenced in any permission set:"
          for m in "${MISSING[@]}"; do
            echo "  - $m"
          done
          echo ""
          echo "Add the field to at least one permission set under force-app/main/default/permissionsets/"
          printf '%s\n' "${MISSING[@]}" > fls_errors.txt
        else
          echo "All changed fields have FLS coverage in a permission set."
        fi

    - name: Check .cls files have matching .cls-meta.xml in diff
      shell: bash
      env:
        CI_COMMIT_REF_NAME: ${{ github.event.pull_request.base.ref }}
      run: |
        CHANGED_FILES=$(git diff --name-only --diff-filter=A  origin/$CI_COMMIT_REF_NAME...HEAD)
        CHANGED_CLS=$(echo "$CHANGED_FILES" | grep -E '\.(cls|trigger)$' || true)

        if [ -z "$CHANGED_CLS" ]; then
          echo "No .cls files changed, skipping meta.xml check."
          exit 0
        fi

        MISSING=()
        while IFS= read -r cls_file; do
          meta_file="${cls_file}-meta.xml"
          if ! echo "$CHANGED_FILES" | grep -qF "$meta_file"; then
            MISSING+=("$meta_file (for $cls_file)")
          fi
        done <<< "$CHANGED_CLS"

        if [ ${#MISSING[@]} -gt 0 ]; then
          echo "ERROR: The following .cls files are missing their .cls-meta.xml in this diff:"
          for m in "${MISSING[@]}"; do
            echo "  - $m"
          done
          echo ""
          echo "Each modified .cls file must be accompanied by its .cls-meta.xml file."
          printf '%s\n' "${MISSING[@]}" > meta_errors.txt
        else
          echo "All changed .cls files have a matching .cls-meta.xml in the diff."
        fi

    - name: Run Code Analyzer
      shell: bash
      run: |
        # Ensure the directory exists before running to avoid silent failures
        if [ ! -d "sgdPackage/force-app" ]; then
          echo "❌ Error: sgdPackage/force-app directory not found."
          exit 1
        fi
        sf code-analyzer run --workspace sgdPackage/force-app --output-file results.csv --config-file code-analyzer.yml --rule-selector eslint:Recommended,retire-js:Recommended,flow:Recommended,cpd:Recommended,pmd:Recommended,sfge:Recommended,regex:NoTrailingWhitespace,regex:AvoidTermsWithImplicitBias,regex:AvoidGetHeapSizeInLoop,regex:MinVersionForAbstractVirtualClassesWithPrivateMethod,regex:NoTodoComments || true
        [ -f results.csv ] && sed -i 's|sgdPackage/||g' results.csv
    - name: Format Results
      shell: python
      run: |
        import csv, os
        res_file = 'results.csv'
        severity_map = {
            "1": "🔴 CRITICAL",
            "2": "🟠 HIGH",
            "3": "🟡 MEDIUM",
            "4": "⚪ LOW",
            "5": "⚪ LOW"
        }
        
        if not os.path.exists(res_file):
            msg = '### ✅ No issues found.'
        else:
            rows = []
            with open(res_file, mode='r', encoding='utf-8') as f:
                reader = csv.DictReader(f)
                for row in reader:
                    # Clean the file path
                    row['file'] = row['file'].replace('sgdPackage/', '')
                    rows.append(row)
            
            # Sort rows by severity (1 is top, 4 is bottom)
            # We convert to int to ensure numeric sorting (1 < 2 < 3)
            rows.sort(key=lambda x: int(x['severity']))

            if rows:
                findings = [
                    f"| {severity_map.get(r['severity'], r['severity'])} | {r['file']} | {r['startLine']}:{r['startColumn']} -{r['endLine']}:{r['endColumn']} | {r['rule']} - {r['message']} - {r['resources']}|"
                    for r in rows
                ]
                header = '### ⚠️ Salesforce Code Analyzer Results\n\n| Severity | File | Location | Message |\n| :--- | :--- | :--- | :--- |\n'
                msg = header + '\n'.join(findings)
            else:
                msg = '### ✅ No issues found.'
        
        with open('pr_comment.md', 'w', encoding='utf-8') as f: 
            f.write(msg)

    - name: Find Comment
      uses: peter-evans/find-comment@v4
      id: fc
      with:
        token: ${{ inputs.github-token }}
        comment-id: ${{ steps.fc.outputs.comment-id }}
        issue-number: ${{ inputs.pr-number }}
    - name: Post PR Comment
      uses: peter-evans/create-or-update-comment@v5
      with:
        token: ${{ inputs.github-token }}
        comment-id: ${{ steps.fc.outputs.comment-id }}
        issue-number: ${{ inputs.pr-number }}
        body-path: pr_comment.md
        edit-mode: replace
    - name: Fail if Issues Found
      shell: bash
      run: |
        FAILED=0

        if [ -f fls_errors.txt ]; then
          echo "::error::FLS check failed — some fields are missing permission set coverage."
          cat fls_errors.txt
          FAILED=1
        fi

        if [ -f meta_errors.txt ]; then
          echo "::error::Meta XML check failed — some .cls files are missing their .cls-meta.xml in this diff."
          cat meta_errors.txt
          FAILED=1
        fi

        if [ -f results.csv ]; then
          # Count rows where Severity is 1 (Critical)
          # Note: NR > 1 skips the CSV header row
          COUNT=$(awk -F',' 'NR > 1 && ($3 == "1" || $3 == "2") {count++} END {print count+0}' results.csv)
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::Found $COUNT critical/high code quality issues."
            FAILED=1
          fi
        fi

        exit $FAILED
